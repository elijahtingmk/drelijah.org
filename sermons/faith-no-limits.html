<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>信心不設限 · 講台互動圖</title>
<meta name="robots" content="noindex, nofollow">
<style>
:root{
  --fs:-apple-system,"PingFang TC","PingFang SC","Hiragino Sans","Noto Sans CJK TC","Microsoft JhengHei","Heiti TC",sans-serif;
  --fserif:"Songti TC","Noto Serif CJK TC","Source Han Serif TC","STSong","SimSun",serif;
  --bg:#ffffff;--bg2:#f5f4ef;--text:#2b2a27;--text2:#73726c;--text3:#9c9a92;--border:#e3e1d8;
  --gold:#BA7517;--gold-soft:#FAC775;--gold-50:#FAEEDA;--gold-800:#633806;--gold-900:#412402;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#1f1e1c;--bg2:#2a2926;--text:#e8e6df;--text2:#a9a79e;--text3:#7d7c75;--border:#3a3934;--gold-50:#332a1c;--gold-800:#FAC775;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fs);line-height:1.7;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:20px 18px 40px}
h1{font-size:20px;font-weight:500;margin:0 0 4px}
.sub{font-size:13px;color:var(--text2);margin:0 0 16px}
svg text{font-family:var(--fs)}
.band{background:var(--bg2);border-radius:8px;padding:10px 14px;margin:0 0 14px;display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.band .lab{color:var(--gold);font-weight:500;font-size:13px;white-space:nowrap}
.band .a{font-size:16px;font-weight:500}
.pt{cursor:pointer}
.panel{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:16px 20px;margin-top:6px}
.bdg{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--gold-soft);color:var(--gold-900);font-weight:500;font-size:14px}
.pill{font-size:12px;padding:3px 10px;border-radius:8px;background:var(--bg2);color:var(--text2)}
.pill.v{background:var(--gold-50);color:var(--gold-800)}
.scr{background:var(--bg2);border-radius:8px;padding:12px 14px;margin:12px 0;font-family:var(--fserif);font-size:16px;line-height:1.9;color:var(--text)}
.anc{font-size:14px;color:var(--text2)}
.anc b{color:var(--gold);font-weight:500}
.ctl{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap}
button{font-family:var(--fs);font-size:14px;color:var(--text);background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;transition:background .15s}
button:hover{background:var(--bg2)}
button:active{transform:scale(0.98)}
.hint{font-size:12px;color:var(--text3);margin-left:auto}
.foot{font-size:12px;color:var(--text3);margin-top:22px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h1>信心不設限</h1>
<p class="sub">在基督裡有無限可能 · 馬太福音 17:14–20 · 講台互動圖</p>

<div class="band"><span class="lab">錨句</span><span class="a">芥菜種的信心，連於無限的基督</span></div>

<svg width="100%" viewBox="0 60 680 240" role="img" aria-label="八個講點沿起伏曲線排列，可點選">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<line x1="45" y1="250" x2="45" y2="72" stroke="var(--text3)" stroke-width="0.8" marker-end="url(#arrow)"/>
<text x="33" y="82" text-anchor="middle" style="font-size:12px;fill:var(--text2)">揚</text>
<text x="33" y="250" text-anchor="middle" style="font-size:12px;fill:var(--text2)">沉</text>
<polyline points="75,200 150,212 225,182 300,268 375,198 450,158 525,140 600,112" fill="none" stroke="var(--text2)" stroke-width="2"/>
<text x="225" y="164" text-anchor="middle" style="font-size:12px;fill:var(--text2)">轉</text>
<text x="300" y="249" text-anchor="middle" style="font-size:12px;fill:var(--text2)">↓ 沉、慢</text>
<text x="525" y="121" text-anchor="middle" style="font-size:12px;fill:var(--text2)">★ 回應</text>
<text x="600" y="93" text-anchor="middle" style="font-size:12px;fill:var(--text2)">↑ 頌讚</text>
<circle id="halo" cx="75" cy="200" r="17" fill="none" stroke="var(--gold)" stroke-width="2.5"/>
<g class="pt" onclick="sel(1)"><circle cx="75" cy="200" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="75" y="200" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">1</text></g>
<g class="pt" onclick="sel(2)"><circle cx="150" cy="212" r="13" fill="var(--bg)" stroke="var(--text3)" stroke-width="2"/><text x="150" y="212" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">2</text></g>
<g class="pt" onclick="sel(3)"><circle cx="225" cy="182" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="225" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">3</text></g>
<g class="pt" onclick="sel(4)"><circle cx="300" cy="268" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="300" y="268" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">4</text></g>
<g class="pt" onclick="sel(5)"><circle cx="375" cy="198" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="375" y="198" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">5</text></g>
<g class="pt" onclick="sel(6)"><circle cx="450" cy="158" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="450" y="158" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">6</text></g>
<g class="pt" onclick="sel(7)"><circle cx="525" cy="140" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="525" y="140" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">7</text></g>
<g class="pt" onclick="sel(8)"><circle cx="600" cy="112" r="13" fill="var(--bg)" stroke="var(--gold)" stroke-width="2"/><text x="600" y="112" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:var(--text)">8</text></g>
<text x="75" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">山腳下</text>
<text x="150" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">主嘆息</text>
<text x="225" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">主一句話</text>
<text x="300" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">信心小</text>
<text x="375" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">芥菜種</text>
<text x="450" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">星期一</text>
<text x="525" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">一個動作</text>
<text x="600" y="292" text-anchor="middle" style="font-size:12px;fill:var(--text2)">何等有福</text>
</svg>

<div class="panel" id="panel"></div>
<div class="ctl">
<button onclick="sel(cur-1)">← 上一個</button>
<button onclick="sel(cur+1)">下一個 →</button>
<span class="hint">點曲線上的數字，或用 ← →</span>
</div>

<p class="foot">經文：和合本（CUV）· 信心不設限</p>
</div>

<script>
var XY=[[75,200],[150,212],[225,182],[300,268],[375,198],[450,158],[525,140],[600,112]];
var B=[
{t:'山腳下',p:'接近 · §一',v:'平實敘事',m:'山上是榮耀，山下是一團亂。父親哀求，領了權柄的門徒卻當眾趕不出鬼。轉向會眾心裡那根刺：「是不是我信心不夠大？」',s:'太17:14–16 ——耶穌和門徒到了眾人那裡，有一個人來見耶穌，跪下，說：「主啊，憐憫我的兒子。他害癲癇的病很苦，屢次跌在火裡，屢次跌在水裡。我帶他到你門徒那裡，他們卻不能醫治他。」\n（背景 太17:5：「這是我的愛子。」）',a:'首次點出錨句，請會眾跟著念。'},
{t:'主嘆息',p:'門檻 · §二',v:'一聲嘆息，放慢',m:'「噯！」是主的心痛，是一千多年的嘆息（摩西之歌的迴響）。不信叫主心痛——但主沒有趕走，祂說：「把他帶到我這裡來。」這就是福音。',s:'太17:17 ——耶穌說：「噯！這又不信又悖謬的世代啊，我在你們這裡要到幾時呢？我忍耐你們要到幾時呢？把他帶到我這裡來吧！」\n（迴響 申32:5、20）',a:'此處不複述；停在「帶他到我這裡來」的福音邀請。'},
{t:'主一句話',p:'門檻 · §三（轉）',v:'由低轉揚',m:'門徒折騰半天趕不出的鬼，主一句話就出來，孩子立刻痊愈。能力不在誰信心大，是因為基督。失敗不是少了一套「醫治的方程式」。',s:'太17:18 ——耶穌斥責那鬼，鬼就出來；從此孩子就痊愈了。',a:'重點不是芥菜種，重點是基督。請會眾再念一遍。'},
{t:'信心小',p:'壓縮 · §四',v:'沉、慢、輕（拆謊言）',m:'主說「信心小」不是「不信」——門徒有信，只是小。拆穿份量的謊言（律法主義：把信心當籌碼交換）。奉主名趕出控告的聲音。芥菜種是百種裡最小的——若論份量，主就該說「大山那麼大的信心」。小信＝放錯地方（彼得看風浪就沉）。芥菜種小到極致，只能容下耶穌。',s:'太17:19–20上 ——「我們為什麼不能趕出那鬼呢？」「是因你們的信心小。」\n太13:32 ——「這原是百種裡最小的。」\n太14:31 ——「你這小信的人哪，為什麼疑惑呢？」',a:'你不需要更大的信心，只要把小信連回基督。'},
{t:'芥菜種，大山',p:'釋放 · §五',v:'漸揚',m:'「不能做的事」原文 ἀδυνατέω＝不可能。無限不從那粒種子來，從它所連的源頭來。手機與電源：百分之一連著電源，勝過百分之百拔掉線。',s:'太17:20下 ——你們若有信心，像一粒芥菜種，就是對這座山說：「你從這邊挪到那邊。」他也必挪去；並且你們沒有一件不能做的事了。\n太19:26 ——在人這是不能的，在神凡事都能。',a:'芥菜種的信心，連於無限的基督。'},
{t:'星期一',p:'釋放 · §六',v:'揚、實際',m:'三個樣子：①領受，不交換（基督已成就，伸手去接）。②那位父親的禱告（認信在先，得醫治在後）。③不再設限（不把神想小了）。',s:'彼前2:24 ——因他受的鞭傷，你們便得了醫治。\n可9:23–24 ——「你若能信，在信的人，凡事都能。」「我信！但我信不足，求主幫助。」\n弗3:20 ——超過我們所求所想的。',a:'三個樣子，每一個都複述一次錨句。'},
{t:'一個動作',p:'釋放 · §七 ★',v:'直接、定睛',m:'唯一的「下次當你…你就要…」：當你又聽見「我信心太小，沒有用」——把眼睛從你的信心挪開，轉去看基督，照那位父親的話禱告。不是檢查信心夠不夠大，是把小信連回基督。',s:'可9:23 ——耶穌對他說：「你若能信，在信的人，凡事都能。」\n可9:24 ——「我信！但我信不足，求主幫助。」',a:'不用等信心變大，連上去就好。'},
{t:'何等有福',p:'釋放 · §八 ↑',v:'揚到頂，頌讚',m:'我們的信心也許只有芥菜種那麼小，可是所連的，是那位被稱愛子、「在神凡事都能」、「超過我們所求所想」的基督。不是因信心大而有福，是因所信的這一位而有福。',s:'弗3:20–21 ——神能照著運行在我們心裡的大力充充足足的成就一切，超過我們所求所想的。但願他在教會中，並在基督耶穌裡，得著榮耀，直到世世代代，永永遠遠。阿們！',a:'收結連續複述三次，然後頌讚。'}
];
var cur=1;
function esc(x){return x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sel(n){
  if(n<1)n=1; if(n>8)n=8; cur=n; var b=B[n-1];
  var h=document.getElementById('halo'); h.setAttribute('cx',XY[n-1][0]); h.setAttribute('cy',XY[n-1][1]);
  document.getElementById('panel').innerHTML=
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">'+
    '<span class="bdg">'+n+'</span><span style="font-size:18px;font-weight:500">'+esc(b.t)+'</span>'+
    '<span class="pill">'+esc(b.p)+'</span><span class="pill v">'+esc(b.v)+'</span></div>'+
    '<p style="margin:0;line-height:1.7">'+esc(b.m)+'</p>'+
    '<div class="scr">'+esc(b.s).replace(/\n/g,'<br>')+'</div>'+
    '<div class="anc"><b>錨句</b>　'+esc(b.a)+'</div>';
}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')sel(cur+1);if(e.key==='ArrowLeft')sel(cur-1);});
sel(1);
</script>
</body>
</html>
