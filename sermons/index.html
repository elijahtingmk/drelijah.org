<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>講道筆記</title>
<meta name="robots" content="noindex, nofollow">
<style>
:root{
  --fs:-apple-system,"PingFang TC","PingFang SC","Hiragino Sans","Noto Sans CJK TC","Microsoft JhengHei","Heiti TC",sans-serif;
  --bg:#ffffff;--bg2:#f5f4ef;--text:#2b2a27;--text2:#73726c;--text3:#9c9a92;--border:#e3e1d8;
  --gold:#BA7517;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#1f1e1c;--bg2:#2a2926;--text:#e8e6df;--text2:#a9a79e;--text3:#7d7c75;--border:#3a3934;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fs);line-height:1.7;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:24px 18px 40px}
h1{font-size:22px;font-weight:500;margin:0 0 4px}
.sub{font-size:13px;color:var(--text2);margin:0 0 22px}
ul{list-style:none;padding:0;margin:0}
li{border-top:0.5px solid var(--border)}
li:last-child{border-bottom:0.5px solid var(--border)}
a.item{display:block;padding:16px 4px;color:var(--text);text-decoration:none;transition:background .15s}
a.item:hover{background:var(--bg2)}
.title{font-size:17px;font-weight:500}
.meta{font-size:13px;color:var(--text2);margin-top:3px}
.tag{color:var(--gold)}
.foot{font-size:12px;color:var(--text3);margin-top:24px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h1>講道筆記</h1>
<p class="sub">private · for my own reference</p>

<ul>
  <li>
    <a class="item" href="faith-no-limits.html">
      <div class="title">信心不設限</div>
      <div class="meta"><span class="tag">馬太福音 17:14–20</span> · 講台互動圖</div>
    </a>
  </li>
</ul>

<p class="foot">drelijah.org / sermons</p>
</div>
</body>
</html>
